<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubCRM AI</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="particles"></div>

        <div class="left-panel">
            <h1>ClubCRM AI</h1>

            <p>
                AI-Powered Club Operating System
            </p>

            <ul>
                <li>Manage Multiple Clubs</li>
                <li>Schedule Meetings</li>
                <li>Track Tasks & Events</li>
                <li>Meeting Notes</li>
                <li>AI Improvement Suggestions</li>
            </ul>
        </div>

        <div class="right-panel">

            <div class="tabs">
                <button id="loginTab" class="active">
                    Login
                </button>

                <button id="registerTab">
                    Register
                </button>
            </div>

            <!-- LOGIN FORM -->

            <div id="loginForm">

                <h2>Welcome Back</h2>

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Email"
                >

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Password"
                >

                <button onclick="login()">
                    Login
                </button>

            </div>

            <!-- REGISTER FORM -->

            <div id="registerForm" class="hidden">

                <h2>Create Account</h2>

                <input
                    type="text"
                    id="regName"
                    placeholder="Full Name"
                >

                <input
                    type="email"
                    id="regEmail"
                    placeholder="Email"
                >

                <input
                    type="password"
                    id="regPassword"
                    placeholder="Password"
                >

                <button onclick="register()">
                    Register
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
